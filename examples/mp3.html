<!DOCTYPE html>
<html>
<head>
  <title>Talking Head - MP3 example with HeadAudio</title>

  <style>
    body, html { width:100%; height:100%; margin: 0; padding: 0; background-color: #202020; color: white; }
    #avatar { display: block; position: absolute; top: 0; left: 0; right: 40%; bottom: 0; }
    #controls { display: flex; flex-direction: column; gap: 10px; position: absolute; top: 50px; left: Calc( 60% + 50px); right: 50px; bottom: 50px;  }
    #load { font-family: Arial; font-size: 20px; padding: 10px; }
    #info { flex: 1; background-color: lightgray; font-family: Arial; font-size: 16px; padding: 10px; overflow-y: auto; }
    #playback { display: flex; gap: 10px; }
    #play { font-family: Arial; font-size: 20px; flex: 1; }
    #stop { font-family: Arial; font-size: 20px; flex: 1; }
    #loading { display: block; position: absolute; top: 50px; left: 50px; width: 200px; font-family: Arial; font-size: 20px; }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs",
      "headaudio": "https://cdn.jsdelivr.net/gh/met4citizen/HeadAudio@latest/modules/headaudio.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";
    import { HeadAudio } from "headaudio";

    let head; // TalkingHead instance
    let headAudio; // HeadAudio instance
    let audioElement; // HTML5 audio element
    let audioSource; // Audio source node
    let isPlaying = false;

    // Load and play audio file
    async function loadAudio(file) {
      try {
        const nodeInfo = document.getElementById('info');
        nodeInfo.textContent = "Loading audio...";

        // Create audio element if it doesn't exist
        if (!audioElement) {
          audioElement = new Audio();
        }

        // Read file and create object URL
        const url = URL.createObjectURL(file);
        audioElement.src = url;
        audioElement.crossOrigin = "anonymous";

        // Create audio context if needed
        if (!head.audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          head.audioCtx = new AudioContext();
        }

        // Create audio source if needed
        if (!audioSource) {
          audioSource = head.audioCtx.createMediaElementSource(audioElement);
        }

        // Initialize HeadAudio if not already done
        if (!headAudio) {
          headAudio = new HeadAudio(head, {
            smoothing: 0.7,
            sensitivity: 1.0
          });
          
          // Connect audio source to HeadAudio
          audioSource.connect(headAudio.node);
          headAudio.node.connect(head.audioCtx.destination);
        }

        // Enable play button
        const nodePlay = document.getElementById('play');
        nodePlay.disabled = false;

        nodeInfo.textContent = "Audio loaded! Click Play to start.\nFile: " + file.name + "\nSize: " + (file.size / 1024).toFixed(2) + " KB";

      } catch (error) {
        console.log(error);
        document.getElementById('info').textContent = 'Error: ' + error.message;
      }
    }

    // Play audio
    function playAudio() {
      if (audioElement) {
        if (head.audioCtx.state === 'suspended') {
          head.audioCtx.resume();
        }
        
        head.start();
        audioElement.play();
        isPlaying = true;
        
        document.getElementById('play').textContent = 'Pause';
        document.getElementById('info').textContent = 'Playing...';
      }
    }

    // Pause audio
    function pauseAudio() {
      if (audioElement) {
        audioElement.pause();
        isPlaying = false;
        
        document.getElementById('play').textContent = 'Play';
        document.getElementById('info').textContent = 'Paused';
      }
    }

    // Stop audio
    function stopAudio() {
      if (audioElement) {
        audioElement.pause();
        audioElement.currentTime = 0;
        isPlaying = false;
        head.stop();
        
        document.getElementById('play').textContent = 'Play';
        document.getElementById('info').textContent = 'Stopped';
      }
    }

    document.addEventListener('DOMContentLoaded', async function(e) {

      // Instantiate the TalkingHead class
      const nodeAvatar = document.getElementById('avatar');
      head = new TalkingHead(nodeAvatar, {
        lipsyncModules: ["en"],
        cameraView: "head"
      });

      // Load and show the avatar
      const nodeLoading = document.getElementById('loading');
      try {
        await head.showAvatar({
          url: 'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png',
          body: 'F',
          avatarMood: 'neutral',
          lipsyncLang: 'en'
        }, (ev) => {
          if (ev.lengthComputable) {
            let val = Math.min(100, Math.round(ev.loaded / ev.total * 100));
            nodeLoading.textContent = "Loading " + val + "%";
          }
        });
        nodeLoading.style.display = 'none';
      } catch (error) {
        console.log(error);
        nodeLoading.textContent = error.toString();
      }

      // File input handler
      const nodeLoad = document.getElementById('load');
      nodeLoad.addEventListener('change', function(ev) {
        let file = ev.target.files[0];
        if (file) {
          loadAudio(file);
        }
      });

      // Play/Pause button handler
      const nodePlay = document.getElementById('play');
      nodePlay.addEventListener('click', function() {
        if (isPlaying) {
          pauseAudio();
        } else {
          playAudio();
        }
      });

      // Stop button handler
      const nodeStop = document.getElementById('stop');
      nodeStop.addEventListener('click', function() {
        stopAudio();
      });

      // Update info when audio ends
      if (audioElement) {
        audioElement.addEventListener('ended', function() {
          stopAudio();
          document.getElementById('info').textContent = 'Audio finished';
        });
      }

      // Pause animation when document is not visible
      document.addEventListener("visibilitychange", async function (ev) {
        if (document.visibilityState === "visible") {
          if (isPlaying) {
            head.start();
          }
        } else {
          head.stop();
        }
      });

    });

  </script>
</head>

<body>
  <div id="avatar"></div>
  <div id="controls">
    <input id="load" type="file" accept=".m4a,.mp3,.webm,.mp4,.mpga,.wav,.mpeg">
    <div id="info">Select an audio file to start</div>
    <div id="playback">
      <input id="play" type="button" value="Play" disabled="disable">
      <input id="stop" type="button" value="Stop">
    </div>
  </div>
  <div id="loading"></div>
</body>

</html>
